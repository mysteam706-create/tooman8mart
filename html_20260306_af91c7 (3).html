            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('toom_b.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        body.glow-effect::before {

            transform: scale(1.02);
        }

        .animated-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .line {
            position: absolute;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #00ffff, transparent);
            opacity: 0.3;
            animation: moveLine 8s linear infinite;
        }

        @keyframes moveLine {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .mouse-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.2) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .container {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            max-width: 600px;
            width: 100%;
            transition: all 0.3s ease;
            border: 2px solid #00ffff;
            position: relative;
            z-index: 2;
            animation: containerPulse 4s ease-in-out infinite;
        }

        @keyframes containerPulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
                border-color: #00ffff;
            }
            50% {
                box-shadow: 0 0 50px rgba(0, 255, 255, 0.6);
                border-color: #66ffff;
            }
        }

        .container:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .logo {
            max-width: 150px;
            height: auto;
            filter: drop-shadow(0 0 10px #00ffff);
            animation: logoGlow 3s ease-in-out infinite;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
        }
        
        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 10px #00ffff); }
            50% { filter: drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 30px #00ffff); }
        }

        .flowers-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }

        .flower {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 15px #00ffff);
            animation: flowerFloat 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .flower-left {
            transform: rotate(-10deg);
            animation: flowerFloatLeft 4s ease-in-out infinite;
        }

        .flower-right {
            transform: rotate(10deg) scaleX(-1);
            animation: flowerFloatRight 4s ease-in-out infinite;
        }

        .flower:hover {
            transform: scale(1.2) rotate(0deg);
            filter: drop-shadow(0 0 25px #00ffff);
        }

        @keyframes flowerFloatLeft {
            0%, 100% { transform: rotate(-10deg) translateY(0); }
            50% { transform: rotate(-5deg) translateY(-15px); }
        }

        @keyframes flowerFloatRight {
            0%, 100% { transform: rotate(10deg) scaleX(-1) translateY(0); }
            50% { transform: rotate(5deg) scaleX(-1) translateY(-15px); }

            left: -100%;

            mouseGlow.style.top = e.clientY + 'px';

            clearTimeout(window.glowTimeout);

            }, 100);
        });

        // Создаем искры при быстром движении
        let lastX = 0, lastY = 0;
        
        document.addEventListener('mousemove', (e) => {
            const speed = Math.abs(e.clientX - lastX) + Math.abs(e.clientY - lastY);
            
            if (speed > 30) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.width = '10px';
                spark.style.height = '10px';
                spark.style.borderRadius = '50%';
                spark.style.background = 'rgba(0, 255, 255, 0.5)';

                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '9999';
